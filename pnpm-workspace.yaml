packages:
  - "apps/*"
  - "packages/*"
  - "internal/*"
overrides:
  # Force the domain boundary scanner's aliased TS6 parser to 6.0.3,
  # which the scanner hard-requires; the workspace otherwise dedupes it to
  # 6.0.2 via other typescript@^6 consumers.
  "@typescript/typescript6>@typescript/old": "npm:typescript@6.0.3"
allowBuilds:
  # No image optimization is used by Outcome 1, so its optional native build
  # remains disabled until an image pipeline is deliberately introduced.
  sharp: false
minimumReleaseAgeExclude:
  - 'typescript@6.0.3'
  - '@turbo/darwin-64@2.10.6'
  - '@turbo/darwin-arm64@2.10.6'
  - '@turbo/linux-64@2.10.6'
  - '@turbo/linux-arm64@2.10.6'
  - '@turbo/windows-64@2.10.6'
  - '@turbo/windows-arm64@2.10.6'
  - turbo@2.10.6
