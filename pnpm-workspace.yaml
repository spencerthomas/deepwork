packages:
  - "apps/*"
  - "packages/*"
  - "internal/*"
allowBuilds:
  # No image optimization is used by Outcome 1, so its optional native build
  # remains disabled until an image pipeline is deliberately introduced.
  sharp: false
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.6'
  - '@turbo/darwin-arm64@2.10.6'
  - '@turbo/linux-64@2.10.6'
  - '@turbo/linux-arm64@2.10.6'
  - '@turbo/windows-64@2.10.6'
  - '@turbo/windows-arm64@2.10.6'
  - turbo@2.10.6
